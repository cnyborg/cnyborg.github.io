<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CNyborg AB</title>
  <meta name="description" content="CNyborg AB — Holding company & IT consulting, Sweden." />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:wght@400;600&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f0e0d;
      --fg: #f5f1ed;
      --muted: #8b8680;
      --accent: #d4af37;
      --font: 'Crimson Text', Georgia, serif;
      --mono: 'JetBrains Mono', monospace;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
      padding: clamp(2rem, 8vw, 6rem);
    }

    .wordmark {
      font-size: clamp(2.8rem, 8vw, 6rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--fg);
    }

    .wordmark span {
      color: var(--accent);
    }

    .descriptor {
      margin-top: 1.2rem;
      font-size: clamp(0.85rem, 2vw, 1rem);
      color: var(--muted);
      font-family: var(--mono);
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .divider {
      margin-top: 3rem;
      width: 2rem;
      height: 1px;
      background-color: var(--accent);
      opacity: 0.5;
    }

    .contact {
      margin-top: 2rem;
      font-family: var(--mono);
      font-size: clamp(0.8rem, 1.8vw, 0.9rem);
      color: var(--muted);
    }

    .contact a {
      color: var(--fg);
      text-decoration: none;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s ease, color 0.2s ease;
    }

    .contact a:hover {
      color: var(--accent);
      border-bottom-color: var(--accent);
    }

    .footer {
      position: fixed;
      bottom: clamp(1.5rem, 4vw, 2.5rem);
      right: clamp(1.5rem, 4vw, 2.5rem);
      font-family: var(--mono);
      font-size: 0.7rem;
      color: var(--muted);
      opacity: 0.4;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <h1 class="wordmark"><span>C</span>Nyborg AB</h1>
  <p class="descriptor">Holding company &amp; IT consulting</p>

  <div class="divider"></div>

  <p class="contact">
    <a href="mailto:hello@cnyborg.se">hello@cnyborg.se</a>
  </p>

  <div class="footer">Sweden &middot; Reg. SE</div>

</body>
</html>
