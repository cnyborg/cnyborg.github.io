const map = L.map('map').setView([0, 0], 2)

// Define base map layers
const osmStandard = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap contributors'
})

const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
  maxZoom: 19,
  attribution: '© Esri, Maxar, Earthstar Geographics'
})

const topoMap = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
  maxZoom: 17,
  attribution: '© OpenTopoMap contributors'
})

const terrain = L.tileLayer('https://stamen-tiles-{s}.a.ssl.fastly.net/terrain/{z}/{x}/{y}.jpg', {
  maxZoom: 16,
  attribution: '© Stamen Design, © OpenStreetMap contributors'
})

// Add default layer (satellite)
satellite.addTo(map)

// Track all added layers for auto-zoom
const allLayers = []

// File layer groups
const fileLayerGroups = {}

// Add main legend
const legend = L.control({position: 'topright'})
legend.onAdd = function(map) {
  const div = L.DomUtil.create('div', 'legend')
  
  let html = '<strong style="display: block; margin-bottom: 8px;">Change Types</strong>'
  html += '<div class="legend-item"><span class="legend-color" style="background: #007bff;"></span> Unchanged</div>'
  html += '<div class="legend-item"><span class="legend-color" style="background: #ffc107;"></span> Modified</div>'
  html += '<div class="legend-item"><span class="legend-color" style="background: #00ff3c;"></span> Added</div>'
  html += '<div class="legend-item"><span class="legend-color" style="background: #dc3545;"></span> Deleted</div>'
  
  if (fileDiffs.length > 1) {
    html += '<hr style="margin: 10px 0; border: 0; border-top: 1px solid #ddd;">'
    html += '<strong style="display: block; margin-bottom: 8px;">Files</strong>'
    fileDiffs.forEach(({filename, diff}) => {
      const total = diff.unchanged.length + diff.modified.length + diff.added.length + diff.deleted.length
      html += `<div class="legend-item" style="font-size: 11px; line-height: 1.3;">
        <strong>${filename}</strong><br>
        <span style="color: #666;">
          🔵${diff.unchanged.length} 🟡${diff.modified.length} 🟢${diff.added.length} 🔴${diff.deleted.length}
        </span>
      </div>`
    })
  }
  
  div.innerHTML = html
  return div
}
legend.addTo(map)

function formatMetadata(properties) {
  if (!properties || Object.keys(properties).length === 0) {
    return '<em>No metadata</em>'
  }
  
  let html = '<dl class="popup-metadata">'
  for (const [key, value] of Object.entries(properties)) {
    if (value !== null && value !== undefined) {
      const displayValue = typeof value === 'object' ? JSON.stringify(value) : value
      html += `<dt>${key}</dt><dd>${displayValue}</dd>`
    }
  }
  html += '</dl>'
  return html
}

function formatModifiedMetadata(oldProps, newProps) {
  const allKeys = new Set([...Object.keys(oldProps || {}), ...Object.keys(newProps || {})])
  
  if (allKeys.size === 0) {
    return '<em>No metadata</em>'
  }
  
  let html = '<dl class="popup-metadata">'
  for (const key of allKeys) {
    const oldVal = oldProps?.[key]
    const newVal = newProps?.[key]
    
    if (oldVal !== newVal) {
      html += `<dt>${key} <span class="metadata-change">changed</span></dt>`
      if (oldVal !== undefined && oldVal !== null) {
        const displayOld = typeof oldVal === 'object' ? JSON.stringify(oldVal) : oldVal
        html += `<dd class="metadata-old">${displayOld}</dd>`
      }
      if (newVal !== undefined && newVal !== null) {
        const displayNew = typeof newVal === 'object' ? JSON.stringify(newVal) : newVal
        html += `<dd class="metadata-new">${displayNew}</dd>`
      }
    } else {
      const displayValue = typeof newVal === 'object' ? JSON.stringify(newVal) : newVal
      html += `<dt>${key}</dt><dd>${displayValue}</dd>`
    }
  }
  html += '</dl>'
  return html
}

function getFeatureName(feature) {
  const props = feature.properties || {}
  return props.name || props.title || props.desc || 'Unnamed'
}

function createPopupContent(feature, type, oldProps) {
  const name = getFeatureName(feature)
  const typeLabel = type.charAt(0).toUpperCase() + type.slice(1)
  
  let content = `<div class="popup-title">${name}</div>`
  content += `<div><strong>Status:</strong> ${typeLabel}</div>`
  
  if (type === 'modified' && oldProps) {
    content += '<div class="popup-section">'
    content += formatModifiedMetadata(oldProps, feature.properties)
    content += '</div>'
  } else {
    content += '<div class="popup-section">'
    content += formatMetadata(feature.properties)
    content += '</div>'
  }
  
  return content
}

function addFeatureToMap(feature, color, type, oldProps, layerGroup) {
  const geom = feature.geometry
  if (!geom) return
  
  const name = getFeatureName(feature)
  
  const style = {
    color: color,
    weight: 3,
    opacity: 0.8
  }
  
  const pointStyle = {
    radius: 4,
    fillColor: color,
    color: '#333',
    weight: 1,
    opacity: 1,
    fillOpacity: 0.8
  }
  
  let layer
  
  if (geom.type === 'Point') {
    layer = L.circleMarker([geom.coordinates[1], geom.coordinates[0]], pointStyle)
    layer.bindPopup(createPopupContent(feature, type, oldProps))
    layer.bindTooltip(name, {permanent: true, direction: 'top', opacity: 0.5, className: `feature-label label-${type}`})
    layer.addTo(layerGroup)
  } else {
    // For LineString, MultiLineString, Polygon, etc.
    layer = L.geoJSON(feature, {
      style: style,
      pointToLayer: (feature, latlng) => {
        return L.circleMarker(latlng, pointStyle)
      },
      onEachFeature: (feature, layer) => {
        layer.bindPopup(createPopupContent(feature, type, oldProps))
      }
    })
    layer.addTo(layerGroup)
  }
  
  allLayers.push(layer)
}

// Process each file and create layer groups
fileDiffs.forEach(({filename, diff}) => {
  const layerGroup = L.layerGroup()
  fileLayerGroups[filename] = layerGroup
  
  // Add features by type to this file's layer group
  diff.unchanged.forEach(f => addFeatureToMap(f, '#007bff', 'unchanged', null, layerGroup))
  diff.modified.forEach(m => addFeatureToMap(m.feature, '#ffc107', 'modified', m.oldProperties, layerGroup))
  diff.added.forEach(f => addFeatureToMap(f, '#00ff3c', 'added', null, layerGroup))
  diff.deleted.forEach(f => addFeatureToMap(f, '#dc3545', 'deleted', null, layerGroup))
  
  // Add layer group to map (visible by default)
  layerGroup.addTo(map)
})

// Create layer control with base maps and file overlays
const baseMaps = {
  "Satellite": satellite,
  "Street Map": osmStandard,
  "Topographic": topoMap,
  "Terrain": terrain
}

if (fileDiffs.length > 1) {
  const overlayMaps = {}
  fileDiffs.forEach(({filename}) => {
    overlayMaps[filename] = fileLayerGroups[filename]
  })
  L.control.layers(baseMaps, overlayMaps).addTo(map)
} else {
  L.control.layers(baseMaps).addTo(map)
}

// Auto-zoom to fit all features
if (allLayers.length > 0) {
  const group = L.featureGroup(allLayers)
  map.fitBounds(group.getBounds(), { padding: [50, 50] })
}
